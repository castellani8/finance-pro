<svg width="880" height="540" viewBox="0 0 880 540" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Instrument Sans','Inter','Segoe UI',Arial,sans-serif" role="img" aria-label="Prévia do painel Milia Invest">
    <defs>
        <linearGradient id="mhd-card" x1="0" y1="0" x2="880" y2="540" gradientUnits="userSpaceOnUse">
            <stop stop-color="#121212"/>
            <stop offset="1" stop-color="#0A0A0A"/>
        </linearGradient>
        <linearGradient id="mhd-line" x1="60" y1="420" x2="560" y2="230" gradientUnits="userSpaceOnUse">
            <stop stop-color="#E6C65C"/>
            <stop offset="1" stop-color="#D4AF37"/>
        </linearGradient>
        <linearGradient id="mhd-area" x1="310" y1="240" x2="310" y2="470" gradientUnits="userSpaceOnUse">
            <stop stop-color="#D4AF37" stop-opacity="0.25"/>
            <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <!-- janela -->
    <rect x="0.5" y="0.5" width="879" height="539" rx="20" fill="url(#mhd-card)" stroke="#2B2B2B"/>
    <circle cx="30" cy="28" r="5.5" fill="#D9645C"/>
    <circle cx="50" cy="28" r="5.5" fill="#D4AF37"/>
    <circle cx="70" cy="28" r="5.5" fill="#57A97D"/>
    <text x="96" y="33" font-size="13" fill="#6E6E6E">app.miliainvest — Dashboard</text>
    <rect x="700" y="16" width="150" height="26" rx="13" fill="#1C1C1C"/>
    <circle cx="717" cy="29" r="6" fill="#D4AF37"/>
    <text x="730" y="33" font-size="12" fill="#A3A3A3">3 alertas hoje</text>
    <line x1="0" y1="52" x2="880" y2="52" stroke="#222222"/>

    <!-- cards de estatística -->
    <g>
        <rect x="28" y="74" width="262" height="96" rx="14" fill="#161616" stroke="#282828"/>
        <text x="48" y="104" font-size="13" fill="#8C8C8C">Patrimônio total</text>
        <text x="48" y="136" font-size="24" font-weight="700" fill="#FAFAF9">R$ 1.248.390</text>
        <rect x="48" y="146" width="92" height="17" rx="8.5" fill="#12251C"/>
        <text x="58" y="158.5" font-size="11" fill="#57C08B">▲ 2,4% no mês</text>
    </g>
    <g>
        <rect x="308" y="74" width="262" height="96" rx="14" fill="#161616" stroke="#282828"/>
        <text x="328" y="104" font-size="13" fill="#8C8C8C">Renda passiva (mês)</text>
        <text x="328" y="136" font-size="24" font-weight="700" fill="#FAFAF9">R$ 4.312</text>
        <rect x="328" y="146" width="118" height="17" rx="8.5" fill="#2A230F"/>
        <text x="338" y="158.5" font-size="11" fill="#E6C65C">12 proventos recebidos</text>
    </g>
    <g>
        <rect x="588" y="74" width="264" height="96" rx="14" fill="#161616" stroke="#282828"/>
