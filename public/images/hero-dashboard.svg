        <text x="806" y="300" font-size="12" fill="#D6D3D1" text-anchor="end">24%</text>
        <rect x="608" y="308" width="224" height="8" rx="4" fill="#242424"/>
        <rect x="608" y="308" width="54" height="8" rx="4" fill="#E6C65C"/>

