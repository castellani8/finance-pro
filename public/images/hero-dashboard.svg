        <text x="806" y="344" font-size="12" fill="#D6D3D1" text-anchor="end">18%</text>
        <rect x="608" y="352" width="224" height="8" rx="4" fill="#242424"/>
        <rect x="608" y="352" width="40" height="8" rx="4" fill="#F0DE9E"/>

        <text x="608" y="388" font-size="12" fill="#A3A3A3">Imóveis</text>
        <text x="806" y="388" font-size="12" fill="#D6D3D1" text-anchor="end">14%</text>
        <rect x="608" y="396" width="224" height="8" rx="4" fill="#242424"/>
        <rect x="608" y="396" width="31" height="8" rx="4" fill="#9C9488"/>

        <text x="608" y="432" font-size="12" fill="#A3A3A3">Veículos e outros</text>
        <text x="806" y="432" font-size="12" fill="#D6D3D1" text-anchor="end">6%</text>
        <rect x="608" y="440" width="224" height="8" rx="4" fill="#242424"/>
        <rect x="608" y="440" width="13" height="8" rx="4" fill="#8C6D3F"/>

        <rect x="608" y="466" width="224" height="30" rx="10" fill="#1C1C1C"/>
        <text x="620" y="485" font-size="11" fill="#A3A3A3">Ouro, opções e colecionáveis inclusos</text>
