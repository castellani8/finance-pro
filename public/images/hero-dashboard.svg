        <path d="M48 458 C100 452, 140 440, 190 442 C250 445, 290 415, 350 405 C410 395, 460 372, 550 358" stroke="#9C9488" stroke-width="2" fill="none" opacity="0.65"/>
        <path d="M48 455 L48 470 L550 470 L550 250 C490 268, 430 290, 380 310 C330 330, 290 355, 240 380 C190 405, 120 440, 48 455 Z" fill="url(#mhd-area)"/>
        <path d="M48 455 C120 440, 190 405, 240 380 C290 355, 330 330, 380 310 C430 290, 490 268, 550 250" stroke="url(#mhd-line)" stroke-width="4" stroke-linecap="round" fill="none"/>
        <circle cx="550" cy="250" r="6" fill="#D4AF37"/>
        <circle cx="550" cy="250" r="11" fill="#D4AF37" opacity="0.25"/>
        <rect x="452" y="222" width="88" height="20" rx="10" fill="#2A230F"/>
        <text x="464" y="236" font-size="11" font-weight="600" fill="#E6C65C">+18,2% a.a.</text>
