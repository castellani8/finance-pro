        <text x="252" y="492" font-size="10" fill="#616161">mai</text>
        <text x="354" y="492" font-size="10" fill="#616161">jul</text>
        <text x="456" y="492" font-size="10" fill="#616161">set</text>
        <text x="530" y="492" font-size="10" fill="#616161">nov</text>

