        <text x="608" y="136" font-size="24" font-weight="700" fill="#57C08B">+ R$ 8.940</text>
        <rect x="608" y="146" width="132" height="17" rx="8.5" fill="#1C1C1C"/>
        <text x="618" y="158.5" font-size="11" fill="#A3A3A3">receitas − despesas</text>
    </g>

