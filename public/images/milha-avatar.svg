<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Milha">
  <defs>
    <linearGradient id="fundo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2f14"/>
      <stop offset="1" stop-color="#15100a"/>
    </linearGradient>
    <linearGradient id="cabelo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4D77E"/>
      <stop offset=".55" stop-color="#E0B44A"/>
      <stop offset="1" stop-color="#C8942E"/>
    </linearGradient>
    <linearGradient id="vestido" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8C55F"/>
      <stop offset="1" stop-color="#B8912E"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <circle cx="32" cy="32" r="32" fill="url(#fundo)"/>
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="#D4AF37" stroke-opacity=".5" stroke-width="1.4"/>

  <!-- cabelo de trás: longo, volumoso, cascateando até a base -->
  <path d="M32 6.5c-10.5 0-17.6 7-18.2 16.5-.4 6 .6 10-1.8 15.5-1.6 3.6-2.6 7.6-2 11.5 2.6-1 4.6-2.8 5.8-5.2.6 3-.1 5.9-1.8 8.6 3.2 1.6 6.4.8 8.6-1.8 1.6 2.2 3.8 3.6 6.6 4.2v-9.6h5.6v9.6c2.8-.6 5-2 6.6-4.2 2.2 2.6 5.4 3.4 8.6 1.8-1.7-2.7-2.4-5.6-1.8-8.6 1.2 2.4 3.2 4.2 5.8 5.2.6-3.9-.4-7.9-2-11.5-2.4-5.5-1.4-9.5-1.8-15.5C49.6 13.5 42.5 6.5 32 6.5z" fill="url(#cabelo)"/>

  <!-- brilhos/ondas do cabelo -->
  <path d="M14.8 32c-.5 5.5-1.6 8.9-3.4 12.6 2.9-1.3 4.8-3.9 5.4-7 .5-2.4 0-4.3-2-5.6z" fill="#F7E29A" opacity=".5"/>
  <path d="M49.2 32c.5 5.5 1.6 8.9 3.4 12.6-2.9-1.3-4.8-3.9-5.4-7-.5-2.4 0-4.3 2-5.6z" fill="#F7E29A" opacity=".5"/>

  <!-- colo e pescoço (o decote em V mostra pele, não fundo) -->
  <path d="M29 41.5h6V48h-6z" fill="#F3CBA5"/>
  <path d="M17 61c1.4-8.2 6.4-12.6 15-12.6S45.6 52.8 47 61a32 32 0 0 1-30 0z" fill="#F3CBA5"/>

  <!-- vestido com decote em V profundo -->
  <path d="M15.8 61.8c.9-8.8 5.4-13.6 12.2-14.6l4 8.2 4-8.2c6.8 1 11.3 5.8 12.2 14.6a32.2 32.2 0 0 1-32.4 0z" fill="url(#vestido)"/>

  <!-- colar com pingente no colo -->
  <path d="M28.4 48.6c2.2 2.6 5 2.6 7.2 0" fill="none" stroke="#D4AF37" stroke-width=".9"/>
  <circle cx="32" cy="51.2" r="1.1" fill="#D4AF37"/>

  <!-- rosto afinado com queixo delicado -->
  <path d="M32 15.5c6.2 0 10.2 4.6 10.2 11.6 0 4.6-1.4 8.8-3.8 11.6-1.8 2.1-4 3.3-6.4 3.3s-4.6-1.2-6.4-3.3c-2.4-2.8-3.8-7-3.8-11.6 0-7 4-11.6 10.2-11.6z" fill="#F8D5AE"/>

  <!-- franja lateral com movimento -->
  <path d="M21.6 27.5c-1.2-8.8 3.4-14 10.4-14 7.6 0 11.8 5.4 10.8 15.2-1.6-4.4-3.1-6.8-5.2-7.9.5 1.5.3 2.9-.6 4.2-2.3-3.6-4.5-5-8.1-5-2.8 0-5.5 2.5-7.3 7.5z" fill="url(#cabelo)"/>
  <path d="M42.4 28.2c.5-4-.1-7.1-1.7-9.4 2.9 1.2 4.4 4.4 4.1 9z" fill="#F7E29A" opacity=".5"/>

  <!-- sobrancelhas arqueadas e definidas -->
  <path d="M23.9 25.9c1.7-1.5 4-1.8 5.5-.9" fill="none" stroke="#A87920" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M34.6 25c1.5-.9 3.8-.6 5.5.9" fill="none" stroke="#A87920" stroke-width="1.25" stroke-linecap="round"/>

  <!-- olhos felinos -->
  <path d="M23.8 29.5c1.3-1.5 3.5-1.7 5-.5l-.4 1c-1.5 1-3.4.9-4.6-.5z" fill="#2A1B08"/>
  <path d="M40.2 29.5c-1.3-1.5-3.5-1.7-5-.5l.4 1c1.5 1 3.4.9 4.6-.5z" fill="#2A1B08"/>
  <circle cx="26.4" cy="30.1" r="1.4" fill="#6B4516"/>
  <circle cx="37.6" cy="30.1" r="1.4" fill="#6B4516"/>
  <circle cx="26.4" cy="30.1" r=".65" fill="#2A1B08"/>
  <circle cx="37.6" cy="30.1" r=".65" fill="#2A1B08"/>
  <circle cx="26.9" cy="29.6" r=".38" fill="#fff"/>
  <circle cx="38.1" cy="29.6" r=".38" fill="#fff"/>
  <path d="M23.8 29.3l-1.4-1M40.2 29.3l1.4-1" stroke="#2A1B08" stroke-width=".8" stroke-linecap="round"/>

  <!-- nariz sutil -->
  <path d="M31.4 34.6c.3.4.9.4 1.2 0" fill="none" stroke="#D9A87C" stroke-width=".75" stroke-linecap="round"/>

  <!-- boca cheia com sorriso leve e confiante -->
  <path d="M28.5 37.2c1.1-1 2.3-1.3 3.5-.8 1.2-.5 2.4-.2 3.5.8-.5 2-1.8 3.1-3.5 3.1s-3-1.1-3.5-3.1z" fill="#AE3350"/>
  <path d="M28.5 37.2c2.3.7 4.7.7 7 0-1.1-1-2.3-1.3-3.5-.8-1.2-.5-2.4-.2-3.5.8z" fill="#D14A64"/>

  <!-- blush sutil nas maçãs do rosto -->
  <ellipse cx="24.8" cy="34" rx="1.5" ry=".85" fill="#EFA987" opacity=".32"/>
  <ellipse cx="39.2" cy="34" rx="1.5" ry=".85" fill="#EFA987" opacity=".32"/>
</svg>
